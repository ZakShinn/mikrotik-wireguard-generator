        function uniqLines(text) {
            const out = [];
            const seen = new Set();
            for (const raw of String(text || '').split('\n')) {
                const s = raw.replace(/#.*/g, '').trim();
                if (!s) continue;
                if (seen.has(s)) continue;
                seen.add(s);
                out.push(s);
            }
            return out;
        }

        function safeName(value, fallback) {
            const v = String(value || '').trim();
            if (!v) return fallback;
            return v.replace(/\s+/g, '_').replace(/[^a-zA-Z0-9_\-]/g, '_');
        }

        function isGatewayLikelyInterface(gw) {
            const s = String(gw || '').trim();
            if (!s) return false;
            if (/^\d{1,3}(\.\d{1,3}){3}$/.test(s)) return false;
            if (/^\d{1,3}(\.\d{1,3}){3}%/.test(s)) return false;
            return true;
        }

                        lanIf: 'bridge',
                        wan1If: 'pppoe-out1',
                        wan1Gw: 'pppoe-out1',
                        wan2If: 'pppoe-out2',
                        wan2Gw: 'pppoe-out2',
                        wan3If: 'ether3',
                        wan3Gw: '10.0.0.1',
                        wan4If: 'ether4',
                        wan4Gw: '10.0.1.1',
                        localSubnets: '192.168.88.0/24',
                        pccMode: 'both-addresses-and-ports',
                        includeOutput: true,
                        addFailoverMain: true,
                        checkGatewayPing: false,
                        addMasq: true
                    },
                    fieldMeta: {
                        lanIf: '',
                        wan1If: '', wan1Gw: '',
                        wan2If: '', wan2Gw: '',
                        wan3If: '', wan3Gw: '',
                        wan4If: '', wan4Gw: ''
                    }
                };
            },
            computed: {
                t() { return i18n[this.lang]; },
                effectiveWans() {
                    const n = Math.max(2, Math.min(4, parseInt(this.form.wanCount, 10) || 2));
                    const wans = [];
                    for (let i = 1; i <= n; i++) {
                        const outIf = String(this.form[`wan${i}If`] || '').trim();
                        const gw = String(this.form[`wan${i}Gw`] || '').trim() || outIf;
                        wans.push({
                            idx: i,
                            outIf: outIf || `wan${i}`,
                            gw: gw || outIf || `wan${i}`,
                            connMark: safeName(`PCC_WAN${i}_CONN`, `PCC_WAN${i}_CONN`),
                            routeMark: safeName(`to_wan${i}`, `to_wan${i}`),
                            tableName: safeName(`to_wan${i}`, `to_wan${i}`)
                        });
                    }
                    return wans;
                },
                localList() {
                    return uniqLines(this.form.localSubnets);
                }
            },
            methods: {
                toggleTheme() {
                    if (typeof MikrotikTheme !== 'undefined') MikrotikTheme.toggle();
                    this.theme = typeof MikrotikTheme !== 'undefined' ? MikrotikTheme.get() : 'light';
                },
                copyText(id) {
                    navigator.clipboard.writeText(document.getElementById(id).innerText);
                    this.showToast = true;
                    setTimeout(() => { this.showToast = false; }, 3000);
                },
                generate() {
                    const ros = this.form.rosVersion === 'v6' ? 'v6' : 'v7';
                    const lanIf = String(this.form.lanIf || '').trim() || 'bridge';
                    const wans = this.effectiveWans;
                    const locals = this.localList;
                    const pccMode = String(this.form.pccMode || 'both-addresses-and-ports').trim();
                    const includeOutput = !!this.form.includeOutput;
                    const addFailoverMain = !!this.form.addFailoverMain;
                    const checkGatewayPing = !!this.form.checkGatewayPing;
                    const addMasq = !!this.form.addMasq;

                    const pccTotal = wans.length;
                    const pccBase = `${pccMode}:${pccTotal}/`;
                    const lines = [];

                    lines.push(`# PCC Load Balancing (tool-generated) — MikroTik Tools`);
                    lines.push(`# RouterOS: ${ros} | WANs: ${pccTotal} | LAN in-if: ${lanIf} | PCC: ${pccMode}`);
                    lines.push('');

                    lines.push(`# --- Address-list LOCAL (bypass PCC for internal networks)`);
                    lines.push('/ip firewall address-list');
                    lines.push(`:foreach i in=[find where list="LOCAL"] do={ remove $i }`);
                    if (locals.length) {
                        for (const s of locals) lines.push(`add list="LOCAL" address=${s} comment="LOCAL (tool)"`);
                    } else {
                        lines.push(`# NOTE: No local subnets provided. Add your LAN/VPN CIDRs to avoid marking internal traffic.`);
                    }
                    lines.push('');

                    if (ros === 'v7') {
                        lines.push(`# --- Routing tables (RouterOS v7+)`);
                        lines.push('/routing table');
                        for (const w of wans) {
                            lines.push(`:if ([:len [find where name="${w.tableName}"]] = 0) do={ add fib name="${w.tableName}" }`);
                        }
                        lines.push('');
                    }

                    lines.push(`# --- Mangle PCC`);
                    lines.push('/ip firewall mangle');
                    lines.push(`# Clean old rules created by this tool tag`);
                    lines.push(`:foreach i in=[find where comment~"^PCC: "] do={ remove $i }`);
                    lines.push('');
                    lines.push(`# 0) Bypass LOCAL destinations (LAN/VPN/...)`);
                    lines.push(`add chain=prerouting action=accept dst-address-list=LOCAL in-interface=${lanIf} comment="PCC: bypass LOCAL (prerouting)"`);
                    if (includeOutput) lines.push(`add chain=output action=accept dst-address-list=LOCAL comment="PCC: bypass LOCAL (output)"`);
                    lines.push('');
                    lines.push(`# 1) Mark connections by PCC (new connections from LAN only, to non-local)`);
                    for (let i = 0; i < wans.length; i++) {
                        const w = wans[i];
                        lines.push(`add chain=prerouting in-interface=${lanIf} connection-mark=no-mark dst-address-type=!local action=mark-connection new-connection-mark=${w.connMark} passthrough=yes per-connection-classifier=${pccBase}${i} comment="PCC: ${w.connMark} (pcc ${i}/${pccTotal})"`);
                    }
                    lines.push('');
                    lines.push(`# 2) Mark routing based on connection-mark`);
                    for (const w of wans) {
                        if (ros === 'v7') {
                            lines.push(`add chain=prerouting in-interface=${lanIf} connection-mark=${w.connMark} action=mark-routing new-routing-mark=${w.tableName} passthrough=no comment="PCC: route ${w.tableName} (prerouting)"`);
                        } else {
                            lines.push(`add chain=prerouting in-interface=${lanIf} connection-mark=${w.connMark} action=mark-routing new-routing-mark=${w.routeMark} passthrough=no comment="PCC: route ${w.routeMark} (prerouting)"`);
                        }
                    }
                    if (includeOutput) {
                        lines.push('');
                        lines.push(`# 3) (Optional) Router-originated traffic (output chain)`);
                        for (let i = 0; i < wans.length; i++) {
                            const w = wans[i];
                            lines.push(`add chain=output connection-mark=no-mark dst-address-type=!local action=mark-connection new-connection-mark=${w.connMark} passthrough=yes per-connection-classifier=${pccBase}${i} comment="PCC: ${w.connMark} (output pcc ${i}/${pccTotal})"`);
                        }
                        for (const w of wans) {
                            if (ros === 'v7') {
                                lines.push(`add chain=output connection-mark=${w.connMark} action=mark-routing new-routing-mark=${w.tableName} passthrough=no comment="PCC: route ${w.tableName} (output)"`);
                            } else {
                                lines.push(`add chain=output connection-mark=${w.connMark} action=mark-routing new-routing-mark=${w.routeMark} passthrough=no comment="PCC: route ${w.routeMark} (output)"`);
                            }
                        }
                    }
                    lines.push('');

                    lines.push(`# --- Default routes per WAN table/mark`);
                    lines.push('/ip route');
                    for (const w of wans) {
                        const rtSelector = ros === 'v7' ? `routing-table="${w.tableName}"` : `routing-mark="${w.routeMark}"`;
                        lines.push(`:foreach i in=[find where dst-address="0.0.0.0/0" and ${rtSelector}] do={ remove $i }`);
                        const gwArg = w.gw;
                        const cg = (checkGatewayPing && !isGatewayLikelyInterface(gwArg)) ? ' check-gateway=ping' : '';
                        if (ros === 'v7') {
                            lines.push(`add dst-address=0.0.0.0/0 gateway=${gwArg} routing-table=${w.tableName}${cg} comment="PCC: default via ${gwArg} (${w.tableName})"`);
                        } else {
                            lines.push(`add dst-address=0.0.0.0/0 gateway=${gwArg} routing-mark=${w.routeMark}${cg} comment="PCC: default via ${gwArg} (${w.routeMark})"`);
                        }
                    }
                    lines.push('');

                    if (addFailoverMain) {
                        lines.push(`# --- Main table default routes (failover for router itself)`);
                        lines.push(`# NOTE: If you already manage main default routes, disable this option to avoid duplicates.`);
                        for (let i = 0; i < wans.length; i++) {
                            const w = wans[i];
                            const gwArg = w.gw;
                            const cg = (checkGatewayPing && !isGatewayLikelyInterface(gwArg)) ? ' check-gateway=ping' : '';
                            const dist = i + 1;
                            lines.push(`add dst-address=0.0.0.0/0 gateway=${gwArg} distance=${dist}${cg} comment="PCC: main failover via ${gwArg} (dist ${dist})"`);
                        }
                        lines.push('');
                    }

                    if (addMasq) {
                        lines.push(`# --- NAT masquerade (optional)`);
                        lines.push('/ip firewall nat');
                        lines.push(`# NOTE: Review existing NAT rules to avoid duplicates.`);
                        for (const w of wans) {
                            lines.push(`add chain=srcnat action=masquerade out-interface=${w.outIf} comment="PCC: masquerade via ${w.outIf}"`);
                        }
                        lines.push('');
                    }

                    lines.push('# Done.');
                    this.script = lines.join('\n');
                }
            },
            mounted() {
                const onTheme = (e) => { this.theme = e.detail.theme; };
                window.addEventListener('mikrotik-theme-effective-change', onTheme);
                this._offTheme = () => window.removeEventListener('mikrotik-theme-effective-change', onTheme);
            },
            beforeUnmount() {
                if (this._offTheme) this._offTheme();
            }
        }).mount('#app');
    </script>
</body>
</html>
