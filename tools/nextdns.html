<body class="app-shell">
    <div class="noise" aria-hidden="true"></div>
    <div id="app" class="app-shell">
        <div v-if="showToast" class="toast-msg"><i class="fas fa-check-circle text-success mr-2"></i> {{ t.ui.copied }}</div>

        <nav class="tool-nav">
            <div class="tool-nav-inner">
                <div class="tool-nav-row">
                    <div class="tool-nav-brand">
                        <a href="../index.html" class="btn btn-ghost btn-sm btn-icon" title="Trang chủ" aria-label="Trang chủ"><i class="fas fa-home"></i></a>
                        <span class="tool-nav-logo" aria-hidden="true"><img src="../Logo.png" alt="" width="34" height="34" decoding="async"></span>
                        <h1 class="tool-nav-title"><i class="fas fa-filter accent-icon"></i> NextDNS</h1>
                    </div>
                    <div class="tool-nav-actions">
                        <button type="button" class="btn btn-ghost btn-sm btn-icon" @click="toggleTheme" :aria-label="theme === 'dark' ? t.ui.themeLight : t.ui.themeDark" :title="theme === 'dark' ? t.ui.themeLight : t.ui.themeDark">
                            <i :class="theme === 'dark' ? 'fas fa-sun' : 'fas fa-moon'" aria-hidden="true"></i>
                        </button>
                        <button type="button" class="btn btn-ghost btn-sm" @click="toggleLang">
                            <i class="fas fa-globe mr-1"></i> {{ lang === 'vi' ? 'English' : 'Tiếng Việt' }}
                        </button>
                    </div>
                    <div class="tool-nav-meta">
                        <div><strong>Nghĩa Zakshin</strong></div>
                        <div class="tool-nav-meta-sub">MikroTik Tools</div>
                        <div class="tool-nav-meta-sub"><i class="fas fa-circle-check mr-1"></i> {{ t.ui.testedOn }}</div>
                    </div>
                </div>
            </div>
        </nav>

        <main class="tool-main">
            <div class="layout-split">
                <section class="panel nat-panel-form">
                    <h2 class="section-title"><i class="fas fa-sliders-h mr-2"></i> {{ t.ui.serverConfig }}</h2>

                    <div v-for="field in fieldsList" :key="field" class="field">
                        <label class="label">
                            {{ t.labels[field] }}
                            <span class="info-tip" tabindex="0"><i class="fas fa-circle-question"></i>
                                <span class="tip-content">
                                    <span class="tip-header">{{ t.labels[field] }}</span>
                                    <span class="tip-row"><span class="t-label">{{ t.ui.tipAim }}</span><span class="t-val">{{ t.hints[field].aim }}</span></span>
                                    <span class="tip-row"><span class="t-label">{{ t.ui.tipType }}</span><span class="t-val">{{ t.hints[field].type }}</span></span>
                                    <span class="tip-row"><span class="t-label">{{ t.ui.tipDef }}</span><span class="t-val"><span class="tip-def">{{ t.hints[field].def }}</span></span></span>
                                </span>
                            </span>
                        </label>
                        <div class="control"><input class="input" v-model="form[field]"></div>
                    </div>

                    <div class="field">
                        <label class="checkbox-row">
                            <input type="checkbox" v-model="form.useUltralowServers">
                            <span class="checkbox-text">{{ t.ui.useUltralowServers }}</span>
                            <span class="info-tip" tabindex="0"><i class="fas fa-circle-question"></i>
                                <span class="tip-content">
                                    <span class="tip-header">{{ t.ui.tipDetails }}</span>
                                    <span class="tip-row"><span class="t-val">{{ t.ui.useUltralowServersTip }}</span></span>
                                </span>
                            </span>
                        </label>
                        <template v-if="form.useUltralowServers">
                            <label class="label">{{ t.labels.plainDnsServers }}
                                <span class="info-tip" tabindex="0"><i class="fas fa-circle-question"></i>
                                    <span class="tip-content">
                                        <span class="tip-header">{{ t.labels.plainDnsServers }}</span>
                                        <span class="tip-row"><span class="t-val">{{ t.hints.plainDnsServers.aim }}</span></span>
                                        <span class="tip-row"><span class="t-label">{{ t.ui.tipDef }}</span><span class="t-val"><span class="tip-def">{{ t.hints.plainDnsServers.def }}</span></span></span>
                                    </span>
                                </span>
                            </label>
                            <div class="control"><input class="input" v-model="form.plainDnsServers" :placeholder="t.hints.plainDnsServers.def"></div>
                            <label class="label">{{ t.labels.plainDnsServersV6 }}
                                <span class="info-tip" tabindex="0"><i class="fas fa-circle-question"></i>
                                    <span class="tip-content">
                                        <span class="tip-header">{{ t.labels.plainDnsServersV6 }}</span>
                                        <span class="tip-row"><span class="t-val">{{ t.hints.plainDnsServersV6.aim }}</span></span>
                                        <span class="tip-row"><span class="t-label">{{ t.ui.tipDef }}</span><span class="t-val"><span class="tip-def">{{ t.hints.plainDnsServersV6.def }}</span></span></span>
                                    </span>
                                </span>
                            </label>
                            <div class="control"><input class="input" v-model="form.plainDnsServersV6" :placeholder="t.hints.plainDnsServersV6.def"></div>
                        </template>
                    </div>
                    <div class="field">
                        <label class="checkbox-row">
                            <input type="checkbox" v-model="form.allowRemote">
                            <span class="checkbox-text">{{ t.ui.allowRemote }}</span>
                            <span class="info-tip" tabindex="0"><i class="fas fa-circle-question"></i>
                                <span class="tip-content">
                                    <span class="tip-header">{{ t.ui.tipDetails }}</span>
                                    <span class="tip-row"><span class="t-val">{{ t.ui.allowRemoteTip }}</span></span>
                                </span>
                            </span>
                        </label>
                    </div>
                    <div class="field">
                        <label class="checkbox-row">
                            <input type="checkbox" v-model="form.verifyCert">
                            <span class="checkbox-text">{{ t.ui.verifyCert }}</span>
                            <span class="info-tip" tabindex="0"><i class="fas fa-circle-question"></i>
                                <span class="tip-content">
                                    <span class="tip-header">{{ t.ui.tipDetails }}</span>
                                    <span class="tip-row"><span class="t-val">{{ t.ui.verifyCertTip }}</span></span>
                                </span>
                            </span>
                        </label>
                    </div>
                    <div class="field">
                        <label class="checkbox-row">
                            <input type="checkbox" v-model="form.includeDhcpDns">
                            <span class="checkbox-text">{{ t.ui.includeDhcpDns }}</span>
                            <span class="info-tip" tabindex="0"><i class="fas fa-circle-question"></i>
                                <span class="tip-content">
                                    <span class="tip-header">{{ t.ui.tipDetails }}</span>
                                    <span class="tip-row"><span class="t-val">{{ t.ui.includeDhcpDnsTip }}</span></span>
                                </span>
                            </span>
                        </label>
                        <template v-if="form.includeDhcpDns">
                            <label class="label">{{ t.labels.routerIp }}
                                <span class="info-tip" tabindex="0"><i class="fas fa-circle-question"></i>
                                    <span class="tip-content">
                                        <span class="tip-header">{{ t.labels.routerIp }}</span>
                                        <span class="tip-row"><span class="t-val">{{ t.hints.routerIp.aim }}</span></span>
                                        <span class="tip-row"><span class="t-label">{{ t.ui.tipDef }}</span><span class="t-val"><span class="tip-def">{{ t.hints.routerIp.def }}</span></span></span>
                                    </span>
                                </span>
                            </label>
                            <div class="control"><input class="input" v-model="form.routerIp" :placeholder="t.hints.routerIp.def"></div>
                        </template>
                    </div>
                    <div class="field">
                        <label class="checkbox-row">
                            <input type="checkbox" v-model="form.includeDnsRedirect">
                            <span class="checkbox-text">{{ t.ui.includeDnsRedirect }}</span>
                            <span class="info-tip" tabindex="0"><i class="fas fa-circle-question"></i>
                                <span class="tip-content">
                                    <span class="tip-header">{{ t.ui.tipDetails }}</span>
                                    <span class="tip-row"><span class="t-val">{{ t.ui.includeDnsRedirectTip }}</span></span>
                                </span>
                            </span>
                        </label>
                    </div>
                    <div class="field mb-0" v-if="form.includeDhcpDns || form.includeDnsRedirect">
                        <label class="label">{{ t.labels.lanNet }}
                            <span class="info-tip" tabindex="0"><i class="fas fa-circle-question"></i>
                                <span class="tip-content">
                                    <span class="tip-header">{{ t.labels.lanNet }}</span>
                                    <span class="tip-row"><span class="t-val">{{ t.hints.lanNet.aim }}</span></span>
                                    <span class="tip-row"><span class="t-label">{{ t.ui.tipDef }}</span><span class="t-val"><span class="tip-def">{{ t.hints.lanNet.def }}</span></span></span>
                                </span>
                            </span>
                        </label>
                        <div class="control"><input class="input" v-model="form.lanNet" :placeholder="t.hints.lanNet.def"></div>
                    </div>
                </section>

                <section class="panel panel-script nat-panel-script">
                    <div class="script-header">
                        <h2 class="section-title mb-0"><i class="fas fa-terminal mr-2"></i> {{ t.ui.scriptTitle }}</h2>
                        <button type="button" class="copy-btn" @click="copyText('main-script')"><i class="fas fa-copy mr-1"></i> {{ t.ui.copy }}</button>
                    </div>
                    <pre id="main-script" class="script-pre">{{ generatedScript }}</pre>
                    <div class="callout mb-0">
                        <strong><i class="fas fa-info-circle mr-1"></i></strong> {{ t.ui.note }}
                    </div>
                </section>
            </div>
        </main>
    </div>

    <script>
        const { createApp } = Vue;
        const i18n = {
            vi: {
                labels: {
                    profile: 'Profile ID',
                    deviceName: 'Tên thiết bị trong NextDNS (tuỳ chọn)',
                    maxConn: 'Số kết nối DoH song song',
                    routerIp: 'IP LAN của router',
                    lanNet: 'Dải LAN',
                    plainDnsServers: 'IPv4 ultralow',
                    plainDnsServersV6: 'IPv6 ultralow'
                },
                hints: {
                    profile: { aim: 'NextDNS → Setup → Router/DNS: ID là đoạn sau dns.nextdns.io/ trong URL.', type: 'Chuỗi', def: 'abc123' },
                    deviceName: { aim: 'Để NextDNS phân nhóm log (Device name). Không dùng thì để trống.', type: 'Chữ hoặc trống', def: 'router-nha' },
                    maxConn: { aim: 'RouterOS giới hạn bao nhiêu phiên DoH chạy song song.', type: 'Số', def: '5' },
                    routerIp: { aim: 'Địa chỉ LAN của router — DHCP sẽ gán đây làm DNS cho máy trong LAN.', type: 'IPv4', def: '192.168.88.1' },
                    lanNet: { aim: 'Phải khớp address trong /ip dhcp-server network print (VD 192.168.88.0/24). Dùng cho block DHCP và NAT redirect trong script.', type: 'CIDR', def: '192.168.88.0/24' },
                    plainDnsServers: { aim: 'Danh sách IPv4 ultralow của NextDNS (số có thể khác vùng — lấy trong NextDNS → Setup → Router). Nhiều IP cách nhau dấu phẩy.', type: 'IPv4, phẩy', def: '45.90.28.0,45.90.30.0' },
                    plainDnsServersV6: { aim: 'IPv6 ultralow tương tự; không dùng IPv6 thì để trống.', type: 'IPv6, phẩy', def: '2a07:a8c0::,2a07:a8c1::' }
                },
                ui: {
                    tipDetails: 'Chi tiết',
                    tipAim: 'Ý nghĩa',
                    tipType: 'Kiểu',
                    tipDef: 'Ví dụ',
                    serverConfig: 'Thông số',
                    scriptTitle: 'Script RouterOS',
                    copy: 'Copy script',
                    scriptComment: 'RouterOS 7+',
                    allowRemote: 'Cho LAN hỏi DNS qua IP router',
                    allowRemoteTip: 'Bật khi máy trong LAN đặt DNS là gateway và bạn muốn resolver chạy trên router (thường dùng kèm DoH NextDNS).',
                    verifyCert: 'Kiểm tra chứng chỉ HTTPS của NextDNS',
                    verifyCertTip: 'Nên bật để giảm rủi ro máy chủ DoH giả mạo.',
                    includeDhcpDns: 'Thêm lệnh DHCP: DNS máy con = router',
                    includeDhcpDnsTip: 'Script chèn /ip dhcp-server network … dns-server=. Chỉ bật nếu DHCP MikroTik phải đẩy DNS xuống client. Nhiều mạng DHCP thì sửa [find …] cho khớp.',
                    includeDnsRedirect: 'Thêm NAT: ép DNS (cổng 53) trong LAN về router',
                    includeDnsRedirectTip: 'Máy đặt DNS 8.8.8.8 hay 1.1.1.1 vẫn bị chuyển về resolver trên router (dstnat redirect). Nên bật “Cho LAN hỏi DNS qua router”. Tránh trùng rule NAT cũ.',
                    useUltralowServers: 'Điền thêm DNS thuần (servers=) kèm DoH',
                    useUltralowServersTip: 'DoH vẫn qua use-doh-server=; đồng thời điền servers= bằng IPv4+IPv6 ultralow (một chuỗi, phân cách phẩy). Tắt nếu muốn servers trống.',
                    dhcpDnsComment: 'Tuỳ chọn — DHCP trỏ DNS về router',
                    dnsRedirectComment: 'Tuỳ chọn — NAT redirect DNS (UDP/TCP 53) về router',
                    note: 'Cần RouterOS 7+. Sau khi dán chạy /ip dns print. IP ultralow có thể khác vùng — đối chiếu trong NextDNS.',
                    copied: 'Đã sao chép!',
                    testedOn: 'Đã test ổn định trên RouterOS v7.22',
                    themeDark: 'Giao diện tối',
                    themeLight: 'Giao diện sáng'
                }
            },
            en: {
                labels: {
                    profile: 'Profile ID',
                    deviceName: 'NextDNS device label (optional)',
                    maxConn: 'Parallel DoH sessions',
                    routerIp: 'Router LAN IP',
                    lanNet: 'LAN subnet',
                    plainDnsServers: 'IPv4 ultralow',
                    plainDnsServersV6: 'IPv6 ultralow'
                },
                hints: {
                    profile: { aim: 'NextDNS → Setup → router/DNS — ID is the segment after dns.nextdns.io/ in the dashboard URL.', type: 'String', def: 'abc123' },
                    deviceName: { aim: 'Shown in NextDNS logs/analytics as the device name. Leave blank if unused.', type: 'Text or empty', def: 'home-router' },
                    maxConn: { aim: 'RouterOS cap on concurrent DoH connections.', type: 'Number', def: '5' },
                    routerIp: { aim: 'Router LAN address DHCP should advertise as the DNS server.', type: 'IPv4', def: '192.168.88.1' },
                    lanNet: { aim: 'Must match /ip dhcp-server network address= (e.g. 192.168.88.0/24). Used by the DHCP + NAT snippets.', type: 'CIDR', def: '192.168.88.0/24' },
                    plainDnsServers: { aim: 'Ultralow IPv4 list for servers=. IPs differ by region — copy from NextDNS → Setup → Router.', type: 'Comma-separated IPv4', def: '45.90.28.0,45.90.30.0' },
                    plainDnsServersV6: { aim: 'Ultralow IPv6 list; leave empty if IPv6 is unused.', type: 'Comma-separated IPv6', def: '2a07:a8c0::,2a07:a8c1::' }
                },
                ui: {
                    tipDetails: 'Details',
                    tipAim: 'Meaning',
                    tipType: 'Type',
                    tipDef: 'Example',
                    serverConfig: 'Parameters',
                    scriptTitle: 'RouterOS script',
                    copy: 'Copy script',
                    scriptComment: 'RouterOS v7+',
                    allowRemote: 'LAN can query DNS via router IP',
                    allowRemoteTip: 'Turn on when LAN devices point DNS at the gateway and you resolve DNS on the router (common with NextDNS DoH).',
                    verifyCert: 'Verify NextDNS TLS certificate',
                    verifyCertTip: 'Recommended to reduce bogus DoH endpoint risk.',
                    includeDhcpDns: 'Add DHCP: push router as DNS',
                    includeDhcpDnsTip: 'Adds /ip dhcp-server network … dns-server=. Enable only if MikroTik DHCP should assign DNS. Adjust [find …] when multiple DHCP networks exist.',
                    includeDnsRedirect: 'Add NAT: LAN DNS port 53 → router',
                    includeDnsRedirectTip: 'Even if clients use 8.8.8.8 / 1.1.1.1, UDP/TCP 53 from LAN hits your resolver via dstnat redirect. Pair with “LAN can query DNS”. Avoid duplicate NAT rules.',
                    useUltralowServers: 'Also fill servers= ultralow IPs',
                    useUltralowServersTip: 'DoH stays on use-doh-server= while servers= lists ultralow IPv4+IPv6 in one comma-separated string. Disable to leave servers empty.',
                    dhcpDnsComment: 'Optional — DHCP DNS via router',
                    dnsRedirectComment: 'Optional — NAT DNS redirect (UDP/TCP 53) to router',
                    note: 'Requires RouterOS v7+. After paste run /ip dns print. Ultralow IPs may vary — verify inside NextDNS.',
                    copied: 'Copied!',
                    testedOn: 'Tested stable on RouterOS v7.22',
                    themeDark: 'Dark theme',
                    themeLight: 'Light theme'
                }
            }
        };

        createApp({
            data() {
                return {
                    lang: 'vi',
                    theme: typeof MikrotikTheme !== 'undefined' ? MikrotikTheme.get() : 'light',
                    showToast: false,
                    fieldsList: ['profile', 'deviceName', 'maxConn'],
                    form: {
                        profile: '',
                        deviceName: '',
                        maxConn: '5',
                        useUltralowServers: true,
                        plainDnsServers: '45.90.28.0,45.90.30.0',
                        plainDnsServersV6: '2a07:a8c0::,2a07:a8c1::',
                        allowRemote: true,
                        verifyCert: true,
                        includeDhcpDns: false,
                        includeDnsRedirect: false,
                        routerIp: '192.168.88.1',
                        lanNet: '192.168.88.0/24'
                    }
                };
            },
            computed: {
                t() { return i18n[this.lang]; },
                dohUrl() {
                    const p = (this.form.profile || '').trim();
                    const d = (this.form.deviceName || '').trim();
                    if (!p) return 'https://dns.nextdns.io/YOUR_PROFILE';
                    const base = 'https://dns.nextdns.io/' + p;
                    return d ? base + '/' + encodeURIComponent(d) : base;
                },
                dnsServersParam() {
                    if (!this.form.useUltralowServers) return '';
                    function normList(str) {
                        return (str || '').split(',').map(function (x) { return x.trim(); }).filter(Boolean);
                    }
                    const parts = normList(this.form.plainDnsServers).concat(normList(this.form.plainDnsServersV6));
                    return parts.join(',');
                },
                generatedScript() {
                    const t = this.t.ui;
                    const ar = this.form.allowRemote ? 'yes' : 'no';
                    const vc = this.form.verifyCert ? 'yes' : 'no';
                    const servers = this.dnsServersParam;
                    const serversArg = servers ? ('servers=' + servers) : 'servers=""';
                    const lines = ['# NextDNS (DoH) — ' + t.scriptComment];
                    lines.push('/ip dns set allow-remote-requests=' + ar + ' ' + serversArg + ' use-doh-server="' + this.dohUrl + '" doh-max-server-connections=' + this.form.maxConn + ' verify-doh-cert=' + vc);
                    if (this.form.includeDhcpDns) {
                        const ip = (this.form.routerIp || '').trim() || '192.168.88.1';
                        const net = (this.form.lanNet || '').trim() || '192.168.88.0/24';
                        lines.push('');
                        lines.push('# ' + t.dhcpDnsComment);
                        lines.push('/ip dhcp-server network set [find address=' + net + '] dns-server=' + ip);
                    }
                    if (this.form.includeDnsRedirect) {
                        const net = (this.form.lanNet || '').trim() || '192.168.88.0/24';
                        lines.push('');
                        lines.push('# ' + t.dnsRedirectComment);
                        lines.push('/ip firewall nat add chain=dstnat action=redirect protocol=udp dst-port=53 src-address=' + net + ' dst-address-type=!local to-ports=53 comment="DNS-redirect-UDP"');
                        lines.push('/ip firewall nat add chain=dstnat action=redirect protocol=tcp dst-port=53 src-address=' + net + ' dst-address-type=!local to-ports=53 comment="DNS-redirect-TCP"');
                    }
                    return lines.join('\n');
                }
            },
            methods: {
                toggleLang() { this.lang = this.lang === 'vi' ? 'en' : 'vi'; },
                toggleTheme() {
                    if (typeof MikrotikTheme !== 'undefined') MikrotikTheme.toggle();
                    this.theme = typeof MikrotikTheme !== 'undefined' ? MikrotikTheme.get() : 'light';
                },
                copyText(id) {
                    navigator.clipboard.writeText(document.getElementById(id).innerText);
                    this.showToast = true;
                    setTimeout(() => { this.showToast = false; }, 2000);
                }
            },
            mounted() {
                const onTheme = (e) => { this.theme = e.detail.theme; };
                window.addEventListener('mikrotik-theme-effective-change', onTheme);
                this._offTheme = () => window.removeEventListener('mikrotik-theme-effective-change', onTheme);
            },
            beforeUnmount() {
                if (this._offTheme) this._offTheme();
            }
        }).mount('#app');
    </script>
</body>
</html>
