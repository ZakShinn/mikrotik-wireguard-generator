                        <div class="wg-actions-stack">
                            <button type="button" class="btn btn-ghost btn-sm btn-icon" @click="toggleTheme" :aria-label="theme === 'dark' ? t.ui.themeLight : t.ui.themeDark" :title="theme === 'dark' ? t.ui.themeLight : t.ui.themeDark">

                            </button>

                            <button type="button" class="btn btn-primary-solid" @click="generateKeys">
                                <i class="fas fa-key mr-2"></i> {{ t.ui.btnGenKeys }}

                    </div>
                    <div class="tool-nav-meta">
                        <div><strong>Nghĩa Zakshin</strong></div>
                        <div class="tool-nav-meta-sub">MikroTik Tools</div>
                        <div class="tool-nav-meta-sub"><i class="fas fa-circle-check mr-1"></i> {{ t.ui.testedOn }}</div>

        <main class="tool-main">

                        <label class="label">
                            {{ t.labels.ifname }}
                            <span class="info-tip" tabindex="0">
                                <i class="fas fa-circle-question"></i>
                                <span class="tip-content">
                                    <span class="tip-header">{{ t.labels.ifname }}</span>
                                    <span class="tip-row"><span class="t-label">{{ t.ui.tipAim }}:</span> <span class="t-val">{{ t.hints.ifname.aim }}</span></span>
                                    <span class="tip-row"><span class="t-label">{{ t.ui.tipType }}:</span> <span class="t-val">{{ t.hints.ifname.type }}</span></span>
                                    <span class="tip-row"><span class="t-label">{{ t.ui.tipDef }}:</span> <span class="tip-code">{{ t.hints.ifname.def }}</span></span>
                                </span>
                            </span>
                        </label>
                        <div class="control"><input class="input" v-model.trim="form.ifname" :placeholder="t.ui.ifPlaceholder"></div>
                    </div>
                    <div class="field">
                        <label class="label">

                                    <span class="tip-row"><span class="t-label">{{ t.ui.tipDef }}:</span> <span class="tip-code">{{ t.hints.port.def }}</span></span>
                                </span>
                            </span>

                        <div class="control"><input class="input" type="number" v-model.number="form.port"></div>
                    </div>

                    <div class="wg-checkboxes">
                        <label class="checkbox-row">

                            <span class="checkbox-text">{{ t.ui.usePsk }}</span>
                            <span class="info-tip" tabindex="0"><i class="fas fa-circle-question"></i>

                                </span>
                            </span>
                        </label>
                        <div class="control"><input class="input" v-model.trim="keys.b.privateKey"></div>

                    <div class="field">

                    <div class="field" v-if="form.usePsk">

                    siteName: { aim: 'Used as a tag/comment so you can search generated rules/peers easily.', type: 'Text', def: 'Hanoi' },
                    wan: { aim: 'Public IP or DDNS hostname of the site (used as endpoint-address by the peer).', type: 'IP / hostname', def: 'vpn.example.com' },
                    lan: { aim: 'LAN subnet behind the site to be routed through the tunnel.', type: 'CIDR', def: '192.168.1.0/24' },
                    tunnelIp: { aim: 'Point-to-point tunnel IPs (recommended /30). Each site uses a different host IP (e.g. .1 and .2).', type: 'CIDR /30', def: '172.16.30.1/30' },
                    usePsk: 'Enable to add a WireGuard preshared key (extra symmetric layer). Recommended.',
                    addFirewallInput: 'Enable to generate an input firewall rule to accept the UDP listen-port.',
                    privateKey: 'Site private key. Generated locally in your browser; you can paste your own if needed.',
                    publicKey: 'Site public key derived from the private key; referenced by the remote peer.',
                    psk: 'Shared symmetric key (preshared-key). Must be identical on both sites.'
                },
                ui: {
                    copied: 'Copied!',
                    copy: 'Copy',
                    btnGenKeys: 'Regenerate Keys/PSK',
                    testedOn: 'RouterOS v7+ recommended',
                    configTitle: 'Site-to-site inputs',
                    scriptPanelTitle: 'Paste script (both sites)',
                    siteA: 'Site A',
                    siteB: 'Site B',
                    privateKey: 'Private key',
                    publicKey: 'Public key',
                    psk: 'Preshared key (PSK)',
                    usePsk: 'Use PSK (recommended)',
                    addFirewallInput: 'Add input rule for UDP port',
                    ifPlaceholder: 'Default: wg (empty = wg-(site name))',
                    tipDetails: 'Details',
                    tipAim: 'Explain',
                    tipType: 'Type',
                    tipDef: 'Example'
                }
            }
        };

        function safe(v) { return String(v ?? '').trim(); }
        function quote(v) { return `"${String(v ?? '').replaceAll('"', '\\"')}"`; }
        function extractIpCidr(s) { return safe(s); }
        function extractHost(s) { return safe(s); }

        function sanitizeNameForId(name) {
            // Keep it RouterOS-friendly for interface/comment tags
            return safe(name)
                .replaceAll(/[\s]+/g, '-')        // spaces -> dash
                .replaceAll(/[^A-Za-z0-9._-]/g, '') // drop special chars
                .replaceAll(/-+/g, '-')           // collapse dashes
                .replaceAll(/^-|-$/g, '')         // trim dashes
                .slice(0, 32) || 'Site';
        }

        function wgTag(siteName) {
            return `wg-${sanitizeNameForId(siteName).toLowerCase()}`;
        }

        function guessNetworkFromCidr(cidr) {
            // Works for /30 and /24-ish formatting; RouterOS accepts network=... optional but nice to set.
            const m = safe(cidr).match(/^(\d{1,3}(?:\.\d{1,3}){3})\/(\d{1,2})$/);
            if (!m) return '';
            const ip = m[1];
            const mask = parseInt(m[2], 10);
            if (mask >= 31) return ip; // /31-/32, just return ip
            const parts = ip.split('.').map(x => parseInt(x, 10));
            if (parts.length !== 4 || parts.some(x => Number.isNaN(x))) return '';
            const ipInt = ((parts[0] << 24) >>> 0) + (parts[1] << 16) + (parts[2] << 8) + parts[3];
            const maskInt = mask === 0 ? 0 : (0xFFFFFFFF << (32 - mask)) >>> 0;
            const netInt = (ipInt & maskInt) >>> 0;
            const net = [(netInt >>> 24) & 255, (netInt >>> 16) & 255, (netInt >>> 8) & 255, netInt & 255].join('.');
            return net;
        }

        function cidrToHostIp(cidr) {
            // Returns the IPv4 part of x.x.x.x/nn if matches
            const m = safe(cidr).match(/^(\d{1,3}(?:\.\d{1,3}){3})\/\d{1,2}$/);
            return m ? m[1] : safe(cidr);
        }

        createApp({
            data() {
                return {
                    lang: 'vi',
                    theme: typeof MikrotikTheme !== 'undefined' ? MikrotikTheme.get() : 'light',
                    showToast: false,
                    form: {
                        ifname: 'wg',
                        port: 13231,
                        usePsk: true,
                        addFirewallInput: true,
                        a: { name: 'Hanoi', wan: '115.115.115.115', lanCidr: '192.168.1.0/24', tunnelIpCidr: '172.16.30.1/30' },
                        b: { name: 'HCM', wan: '14.14.14.14', lanCidr: '192.168.2.0/24', tunnelIpCidr: '172.16.30.2/30' }
                    },
                    keys: {
                        a: { privateKey: '', publicKey: '' },
                        b: { privateKey: '', publicKey: '' },
                        psk: ''
                    }
                };
            },
            computed: {
                t() { return i18n[this.lang]; },
                scriptA() { return this.buildScript('a', this.form.a, this.form.b, this.keys.a, this.keys.b); },
                scriptB() { return this.buildScript('b', this.form.b, this.form.a, this.keys.b, this.keys.a); }
            },
            methods: {
                toggleTheme() {
                    if (typeof MikrotikTheme !== 'undefined') MikrotikTheme.toggle();
                    this.theme = typeof MikrotikTheme !== 'undefined' ? MikrotikTheme.get() : 'light';
                },
                toast() {
                    this.showToast = true;
                    setTimeout(() => { this.showToast = false; }, 2500);
                },
                copyText(id) {
                    const el = document.getElementById(id);
                    const txt = el ? el.innerText : '';
                    navigator.clipboard.writeText(txt);
                    this.toast();
                },
                generateKeys() {
                    const a = (window.wireguard && window.wireguard.generateKeypair) ? window.wireguard.generateKeypair() : null;
                    const b = (window.wireguard && window.wireguard.generateKeypair) ? window.wireguard.generateKeypair() : null;
                    const p = (window.wireguard && window.wireguard.generateKeypair) ? window.wireguard.generateKeypair() : null;
                    if (!a || !b) {
                        this.keys.a.privateKey = '';
                        this.keys.a.publicKey = '';
                        this.keys.b.privateKey = '';
                        this.keys.b.publicKey = '';
                        this.keys.psk = '';
                        return;
                    }
                    this.keys.a.privateKey = a.privateKey;
                    this.keys.a.publicKey = a.publicKey;
                    this.keys.b.privateKey = b.privateKey;
                    this.keys.b.publicKey = b.publicKey;
                    this.keys.psk = p ? p.preSharedKey : '';
                },
                buildScript(selfId, siteSelf, sitePeer, selfKeys, peerKeys) {
                    const ifname = safe(this.form.ifname) || wgTag(siteSelf.name);
                    const port = parseInt(this.form.port, 10);
                    const selfTunnel = extractIpCidr(siteSelf.tunnelIpCidr);
                    const peerTunnelHost = cidrToHostIp(extractIpCidr(sitePeer.tunnelIpCidr));
                    const selfTunnelNetwork = guessNetworkFromCidr(selfTunnel);
                    const peerWan = extractHost(sitePeer.wan);
                    const tag = wgTag(siteSelf.name);

                    const allowed = [
                        `${peerTunnelHost}/32`,
                        safe(sitePeer.lanCidr)
                    ].filter(Boolean).join(',');

                    const lines = [];
                    const isVi = this.lang === 'vi';
                    lines.push(isVi
                        ? `# WireGuard site-to-site: ${safe(siteSelf.name)} -> ${safe(sitePeer.name)}`
                        : `# WireGuard site-to-site: ${safe(siteSelf.name)} -> ${safe(sitePeer.name)}`);
                    lines.push('');
                    lines.push(`/interface wireguard add listen-port=${port} mtu=1420 name=${ifname} private-key=${quote(selfKeys.privateKey)}`);
                    if (this.form.addFirewallInput) {
                        lines.push(`/ip firewall filter add action=accept chain=input comment="${tag}: Allow UDP ${port}" dst-port=${port} protocol=udp`);
                    }
                    if (selfTunnelNetwork) {
                        lines.push(`/ip address add address=${selfTunnel} interface=${ifname} network=${selfTunnelNetwork}`);
                    } else {
                        lines.push(`/ip address add address=${selfTunnel} interface=${ifname}`);
                    }
                    lines.push('');
                    lines.push(`/interface wireguard peers add interface=${ifname} comment="${tag}: Peer ${safe(sitePeer.name)}" public-key=${quote(peerKeys.publicKey)} endpoint-address=${peerWan} endpoint-port=${port} allowed-address=${allowed}${this.form.usePsk && safe(this.keys.psk) ? ` preshared-key=${quote(this.keys.psk)}` : ''}`);
                    lines.push('');
                    lines.push(`/ip route add dst-address=${safe(sitePeer.lanCidr)} gateway=${peerTunnelHost} comment="${tag}: Route to ${safe(sitePeer.name)} LAN"`);
                    return lines.join('\n');
                }
            },
            mounted() {
                const onTheme = (e) => { this.theme = e.detail.theme; };
                window.addEventListener('mikrotik-theme-effective-change', onTheme);
                this._offTheme = () => window.removeEventListener('mikrotik-theme-effective-change', onTheme);
                this.generateKeys();
            },
            beforeUnmount() {
                if (this._offTheme) this._offTheme();
            }
        }).mount('#app');
    </script>
</body>
</html>
