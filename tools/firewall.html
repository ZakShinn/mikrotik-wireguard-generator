<body class="app-shell">
    <div class="noise" aria-hidden="true"></div>
    <div id="app" class="app-shell">
        <div v-if="showToast" class="toast-msg"><i class="fas fa-check-circle text-success mr-2"></i> {{ t.ui.copied }}</div>

        <nav class="tool-nav">
            <div class="tool-nav-inner">
                <div class="tool-nav-row">
                    <div class="tool-nav-brand">
                        <a href="../index.html" class="btn btn-ghost btn-sm btn-icon" title="Trang chủ" aria-label="Trang chủ"><i class="fas fa-home"></i></a>
                        <span class="tool-nav-logo" aria-hidden="true"><img src="../Logo.png" alt="" width="34" height="34" decoding="async"></span>
                        <h1 class="tool-nav-title"><i class="fas fa-shield-halved accent-icon"></i> Firewall</h1>
                    </div>
                    <div class="tool-nav-actions">
                        <button type="button" class="btn btn-ghost btn-sm btn-icon" @click="toggleTheme" :aria-label="theme === 'dark' ? t.ui.themeLight : t.ui.themeDark" :title="theme === 'dark' ? t.ui.themeLight : t.ui.themeDark">
                            <i :class="theme === 'dark' ? 'fas fa-sun' : 'fas fa-moon'" aria-hidden="true"></i>
                        </button>
                        <button type="button" class="btn btn-ghost btn-sm" @click="toggleLang">
                            <i class="fas fa-globe mr-1"></i> {{ lang === 'vi' ? 'English' : 'Tiếng Việt' }}
                        </button>
                    </div>
                    <div class="tool-nav-meta">
                        <div><strong>Nghĩa Zakshin</strong></div>
                        <div class="tool-nav-meta-sub">MikroTik Tools</div>
                    </div>
                </div>
            </div>
        </nav>

        <main class="tool-main">
            <div class="layout-split">
                <section class="panel">
                    <h2 class="section-title"><i class="fas fa-sliders-h mr-2"></i> {{ t.ui.serverConfig }}</h2>

                    <div class="field">
                        <label class="label">
                            {{ t.labels.template }}
                            <span class="info-tip" tabindex="0"><i class="fas fa-circle-question"></i>
                                <span class="tip-content">
                                    <span class="tip-header">{{ t.labels.template }}</span>
                                    <span class="tip-row"><span class="t-label">{{ t.ui.tipAim }}</span><span class="t-val">{{ t.hints.template.aim }}</span></span>
                                    <span class="tip-row"><span class="t-label">{{ t.ui.tipType }}</span><span class="t-val">{{ t.hints.template.type }}</span></span>
                                    <span class="tip-row"><span class="t-label">{{ t.ui.tipDef }}</span><span class="t-val"><span class="tip-def">{{ t.hints.template.def }}</span></span></span>
                                </span>
                            </span>
                        </label>
                        <div class="control">
                            <div class="select">
                                <select v-model="form.template">
                                    <option value="defconf">{{ t.ui.tplDefconf }}</option>
                                    <option value="rickfrey">{{ t.ui.tplRick }}</option>
                                    <option value="rickfrey5">{{ t.ui.tplRick5 }}</option>
                                    <option value="rickfrey6">{{ t.ui.tplRick6 }}</option>
                                    <option value="rickfrey61">{{ t.ui.tplRick61 }}</option>
                                    <option value="rickfrey61lite">{{ t.ui.tplRick61Lite }}</option>
                                </select>
                            </div>
                        </div>
                    </div>

                    <div class="callout">
                        <strong><i class="fas fa-compass mr-1"></i></strong> {{ templateGuidance }}
                    </div>

                    <div v-for="field in fieldsList" :key="field" class="field">
                        <label class="label">
                            {{ t.labels[field] }}
                            <span class="info-tip" tabindex="0"><i class="fas fa-circle-question"></i>
                                <span class="tip-content">
                                    <span class="tip-header">{{ t.labels[field] }}</span>
                                    <span class="tip-row"><span class="t-label">{{ t.ui.tipAim }}</span><span class="t-val">{{ t.hints[field].aim }}</span></span>
                                    <span class="tip-row"><span class="t-label">{{ t.ui.tipType }}</span><span class="t-val">{{ t.hints[field].type }}</span></span>
                                    <span class="tip-row"><span class="t-label">{{ t.ui.tipDef }}</span><span class="t-val"><span class="tip-def">{{ t.hints[field].def }}</span></span></span>
                                </span>
                            </span>
                        </label>
                        <div class="control"><input class="input" v-model="form[field]"></div>
                    </div>

                    <div class="field">
                        <label class="checkbox-row">
                            <input type="checkbox" v-model="form.allowRemoteInput">
                            <span class="checkbox-text">{{ t.ui.allowRemoteInput }}</span>
                            <span class="info-tip" tabindex="0"><i class="fas fa-circle-question"></i>
                                <span class="tip-content">
                                    <span class="tip-header">{{ t.ui.tipDetails }}</span>
                                    <span class="tip-row"><span class="t-val">{{ t.ui.allowRemoteInputTip }}</span></span>
                                </span>
                            </span>
                        </label>
                    </div>

                    <div class="field">
                        <label class="checkbox-row">
                            <input type="checkbox" v-model="form.acceptLanToWan">
                            <span class="checkbox-text">{{ t.ui.acceptLanToWan }}</span>
                            <span class="info-tip" tabindex="0"><i class="fas fa-circle-question"></i>
                                <span class="tip-content">
                                    <span class="tip-header">{{ t.ui.tipDetails }}</span>
                                    <span class="tip-row"><span class="t-val">{{ t.ui.acceptLanToWanTip }}</span></span>
                                </span>
                            </span>
                        </label>
                    </div>

                    <div class="field">
                        <label class="checkbox-row">
                            <input type="checkbox" v-model="form.hardening">
                            <span class="checkbox-text">{{ t.ui.hardening }}</span>
                            <span class="info-tip" tabindex="0"><i class="fas fa-circle-question"></i>
                                <span class="tip-content">
                                    <span class="tip-header">{{ t.ui.tipDetails }}</span>
                                    <span class="tip-row"><span class="t-val">{{ t.ui.hardeningTip }}</span></span>
                                </span>
                            </span>
                        </label>
                    </div>

                    <div class="field" v-if="form.template === 'defconf'">
                        <label class="checkbox-row">
                            <input type="checkbox" v-model="form.includeIpv6Firewall">
                            <span class="checkbox-text">{{ t.ui.includeIpv6Firewall }}</span>
                            <span class="info-tip" tabindex="0"><i class="fas fa-circle-question"></i>
                                <span class="tip-content">
                                    <span class="tip-header">{{ t.ui.tipDetails }}</span>
                                    <span class="tip-row"><span class="t-val">{{ t.ui.includeIpv6FirewallTip }}</span></span>
                                </span>
                            </span>
                        </label>
                    </div>

                    <div class="field" v-if="isRickTemplate">
                        <label class="checkbox-row">
                            <input type="checkbox" v-model="form.includeCommonPorts">
                            <span class="checkbox-text">{{ t.ui.includeCommonPorts }}</span>
                            <span class="info-tip" tabindex="0"><i class="fas fa-circle-question"></i>
                                <span class="tip-content">
                                    <span class="tip-header">{{ t.ui.tipDetails }}</span>
                                    <span class="tip-row"><span class="t-val">{{ t.ui.includeCommonPortsTip }}</span></span>
                                </span>
                            </span>
                        </label>
                    </div>

                    <div class="field" v-if="isRickTemplate">
                        <label class="label">
                            {{ t.ui.rickOriginal }}
                            <span class="info-tip" tabindex="0"><i class="fas fa-circle-question"></i>
                                <span class="tip-content">
                                    <span class="tip-header">{{ t.ui.tipDetails }}</span>
                                    <span class="tip-row"><span class="t-val">{{ t.ui.rickOriginalTip }}</span></span>
                                </span>
                            </span>
                        </label>
                        <div class="control">
                            <textarea class="input" v-model="form.rickOriginalScript" rows="6" style="resize:vertical"></textarea>
                            <p class="help mb-0">{{ t.ui.rickOriginalHelp }}</p>
                        </div>
                    </div>

                    <div class="callout mb-0">
                        <strong><i class="fas fa-triangle-exclamation mr-1"></i></strong> {{ t.ui.warn }}
                    </div>
                </section>

                <section class="panel panel-script">
                    <div style="display:flex; align-items:center; justify-content:space-between; gap:.75rem; margin-bottom:.5rem">
                        <div style="font-weight:700; color:var(--text)"><i class="fas fa-terminal mr-2"></i> {{ t.ui.scriptTitle }}</div>
                        <button type="button" class="btn btn-dark btn-sm copy-btn" @click="copyText('main-script')"><i class="fas fa-copy mr-1"></i> {{ t.ui.copy }}</button>
                    </div>
                    <pre id="main-script" class="script-pre">{{ generatedScript }}</pre>
                    <div class="callout mb-0">
                        <strong><i class="fas fa-info-circle mr-1"></i></strong> {{ t.ui.note }}
                    </div>
                    <div class="callout mt-2 mb-0">
                        <strong><i class="fas fa-link mr-1"></i></strong> {{ t.ui.moreFirewall }}
                        <a href="https://rickfreyconsulting.com" target="_blank" rel="noopener noreferrer">rickfreyconsulting.com</a>
                    </div>
                </section>
            </div>
        </main>
    </div>
