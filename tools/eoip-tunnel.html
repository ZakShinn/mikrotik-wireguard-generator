    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>MikroTik EoIP Tunnel — Sinh script RouterOS | Zakshin</title>

    <meta name="author" content="Nghĩa Zakshin">
    <meta name="robots" content="index, follow, max-image-preview:large, max-snippet:-1, max-video-preview:-1">
    <link rel="sitemap" type="application/xml" title="Sitemap" href="../sitemap.xml">
    <link rel="icon" type="image/png" href="../Logo.png">
    <link rel="apple-touch-icon" href="../Logo.png">
    <link rel="manifest" href="../site.webmanifest">
    <meta name="theme-color" content="#f5f7fa">
    <meta name="format-detection" content="telephone=no">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

            <div class="tool-nav-inner">
                <div class="tool-nav-row">
                    <div class="tool-nav-brand">
                        <a href="../index.html" class="btn btn-ghost btn-sm btn-icon" title="Trang chủ" aria-label="Trang chủ"><i class="fas fa-home"></i></a>
                        <span class="tool-nav-logo" aria-hidden="true"><img src="../Logo.png" alt="" width="34" height="34" decoding="async"></span>
                        <h1 class="tool-nav-title"><i class="fas fa-diagram-project accent-icon"></i> EoIP Tunnel <span class="badge-beta">{{ t.badgeBeta }}</span></h1>

                    <div class="tool-nav-actions">
                        <button type="button" class="btn btn-ghost btn-sm btn-icon" @click="toggleTheme" :aria-label="theme === 'dark' ? t.ui.themeLight : t.ui.themeDark" :title="theme === 'dark' ? t.ui.themeLight : t.ui.themeDark">

                        <button type="button" class="btn btn-ghost btn-sm" @click="toggleLang">

                    <div class="tool-nav-meta">
                        <div><strong>Nghĩa Zakshin</strong></div>
                        <div class="tool-nav-meta-sub">MikroTik Tools</div>
                    </div>
                </div>
            </div>

                    ifBasePlaceholder: 'Mặc định: eoip',
                    portsPlaceholder: 'Ví dụ: ether2,ether3',
                    addInputGre: 'Thêm rule input cho GRE (protocol 47)',
                    addStaticRoutes: 'Thêm static route LAN ↔ LAN (L3)',
                    addBridge: 'Tạo bridge và add EoIP + ports (L2)'
                }
            },
            en: {
                labels: {
                    tunnelId: 'Tunnel ID (must match both sides)',
                    ifBase: 'EoIP interface base name',
                    mtu: 'MTU (recommended 1500)',
                    siteName: 'Site name (comment tag)',
                    wan: 'WAN IP (local-address)',
                    tunnelIp: 'Tunnel IP (CIDR /30)',
                    lanNet: 'LAN CIDR',
                    bridgeName: 'Bridge name (optional)',
                    bridgePorts: 'Ports to add into bridge (comma-separated)'
                },
                hints: {
                    tunnelId: { aim: 'EoIP tunnel identifier. Must match on both routers.', type: 'Number', def: '10' },
                    ifBase: { aim: 'Interface name prefix; the tool appends -<site> automatically.', type: 'Text', def: 'eoip' },
                    mtu: { aim: 'EoIP interface MTU. Lower it if your WAN path has overhead.', type: 'Number', def: '1500' },
                    siteName: { aim: 'Used for comment/tagging so you can search rules/interfaces easily.', type: 'Text', def: 'SiteA' },
                    wan: { aim: 'This router WAN IP (local-address parameter in EoIP).', type: 'IPv4', def: '115.115.115.115' },
                    tunnelIp: { aim: 'Point-to-point IP for the tunnel (usually /30). Each side uses a different host IP.', type: 'CIDR', def: '172.16.1.1/30' },
                    lanNet: { aim: 'LAN subnet behind this site to route (when static routes are enabled).', type: 'CIDR', def: '192.168.1.0/24' },
                    bridgeName: { aim: 'Bridge name for L2 mode (bridge EoIP + LAN ports).', type: 'Text', def: 'bridge-eoip' },
                    bridgePorts: { aim: 'Physical ports to add into the bridge at this site (comma-separated).', type: 'List', def: 'ether2,ether3' },
                    addInputGre: 'Adds an input firewall rule to accept GRE (protocol 47), required for EoIP to work through firewall.',
                    addStaticRoutes: 'Adds static routes LAN↔LAN via the /30 tunnel IPs (L3 mode, no bridging).',
                    addBridge: 'Creates a bridge and adds EoIP + LAN ports for L2 extension (same broadcast domain).'
                },
                ui: {
                    badgeBeta: 'Beta',
                    copied: 'Copied!',
                    copy: 'Copy',
                    themeDark: 'Dark theme',
                    themeLight: 'Light theme',
                    tipDetails: 'Details',
                    tipAim: 'Explain',
                    tipType: 'Type',
                    tipDef: 'Example',
                    configTitle: 'EoIP tunnel inputs',
                    scriptPanelTitle: 'Paste script (both sites)',
                    siteA: 'Site A',
                    siteB: 'Site B',
                    ifBasePlaceholder: 'Default: eoip',
                    portsPlaceholder: 'Example: ether2,ether3',
                    addInputGre: 'Add input rule for GRE (protocol 47)',
                    addStaticRoutes: 'Add static routes LAN ↔ LAN (L3)',
                    addBridge: 'Create a bridge and add EoIP + ports (L2)'
                }
            }
        };

        function safe(v) { return String(v ?? '').trim(); }
        function quote(v) { return `"${String(v ?? '').replaceAll('"', '\\"')}"`; }

        function sanitizeNameForId(name) {
            return safe(name)
                .replaceAll(/[\s]+/g, '-')
                .replaceAll(/[^A-Za-z0-9._-]/g, '')
                .replaceAll(/-+/g, '-')
                .replaceAll(/^-|-$/g, '')
                .slice(0, 24) || 'site';
        }

        function eoipTag(siteName) {
            return `eoip-${sanitizeNameForId(siteName).toLowerCase()}`;
        }

        function guessNetworkFromCidr(cidr) {
            const m = safe(cidr).match(/^(\d{1,3}(?:\.\d{1,3}){3})\/(\d{1,2})$/);
            if (!m) return '';
            const ip = m[1];
            const mask = parseInt(m[2], 10);
            if (mask >= 31) return ip;
            const parts = ip.split('.').map(x => parseInt(x, 10));
            if (parts.length !== 4 || parts.some(x => Number.isNaN(x))) return '';
            const ipInt = ((parts[0] << 24) >>> 0) + (parts[1] << 16) + (parts[2] << 8) + parts[3];
            const maskInt = mask === 0 ? 0 : (0xFFFFFFFF << (32 - mask)) >>> 0;
            const netInt = (ipInt & maskInt) >>> 0;
            return [(netInt >>> 24) & 255, (netInt >>> 16) & 255, (netInt >>> 8) & 255, netInt & 255].join('.');
        }

        function cidrToHostIp(cidr) {
            const m = safe(cidr).match(/^(\d{1,3}(?:\.\d{1,3}){3})\/\d{1,2}$/);
            return m ? m[1] : safe(cidr);
        }

        function splitPorts(text) {
            return safe(text)
                .split(',')
                .map(s => s.trim())
                .filter(Boolean);
        }

        createApp({
            data() {
                return {
                    lang: typeof MikrotikLang !== 'undefined' ? MikrotikLang.get() : 'vi',
                    theme: typeof MikrotikTheme !== 'undefined' ? MikrotikTheme.get() : 'light',
                    showToast: false,
                    form: {
                        tunnelId: 10,
                        ifBase: 'eoip',
                        mtu: 1500,
                        addInputGre: true,
                        addStaticRoutes: true,
                        addBridge: false,
                        bridgeName: 'bridge-eoip',
                        a: { name: 'SiteA', wan: '115.115.115.115', tunnelIpCidr: '172.16.1.1/30', lanCidr: '192.168.1.0/24', bridgePorts: 'ether2' },
                        b: { name: 'SiteB', wan: '14.14.14.14', tunnelIpCidr: '172.16.1.2/30', lanCidr: '192.168.2.0/24', bridgePorts: 'ether2' }
                    }
                };
            },
            computed: {
                t() { return i18n[this.lang]; },
                badgeBeta() { return this.t.ui.badgeBeta || 'Beta'; },
                scriptA() { return this.buildScript('a', this.form.a, this.form.b); },
                scriptB() { return this.buildScript('b', this.form.b, this.form.a); }
            },
            methods: {
                toggleLang() {
                    if (typeof MikrotikLang !== 'undefined') this.lang = MikrotikLang.toggle();
                    else this.lang = this.lang === 'vi' ? 'en' : 'vi';
                },
                toggleTheme() {
                    if (typeof MikrotikTheme !== 'undefined') MikrotikTheme.toggle();
                    this.theme = typeof MikrotikTheme !== 'undefined' ? MikrotikTheme.get() : 'light';
                },
                toast() {
                    this.showToast = true;
                    setTimeout(() => { this.showToast = false; }, 2500);
                },
                copyText(id) {
                    const el = document.getElementById(id);
                    const txt = el ? el.innerText : '';
                    navigator.clipboard.writeText(txt);
                    this.toast();
                },
                buildScript(selfId, siteSelf, sitePeer) {
                    const tag = eoipTag(siteSelf.name);
                    const tunnelId = parseInt(this.form.tunnelId, 10);
                    const mtu = parseInt(this.form.mtu, 10) || 1500;
                    const ifBase = safe(this.form.ifBase) || 'eoip';
                    const ifName = `${ifBase}-${sanitizeNameForId(siteSelf.name).toLowerCase()}`.slice(0, 32);
                    const isVi = this.lang === 'vi';

                    const localWan = safe(siteSelf.wan);
                    const remoteWan = safe(sitePeer.wan);
                    const selfTun = safe(siteSelf.tunnelIpCidr);
                    const selfTunNet = guessNetworkFromCidr(selfTun);
                    const peerTunHost = cidrToHostIp(safe(sitePeer.tunnelIpCidr));

                    const lines = [];
                    lines.push(isVi
                        ? `# EoIP Tunnel: ${safe(siteSelf.name)} <-> ${safe(sitePeer.name)}`
                        : `# EoIP Tunnel: ${safe(siteSelf.name)} <-> ${safe(sitePeer.name)}`);
                    lines.push('');
                    lines.push(`/interface eoip add name=${ifName} local-address=${localWan} remote-address=${remoteWan} tunnel-id=${tunnelId} mtu=${mtu} comment=${quote(`${tag}: eoip`)}`);
                    if (this.form.addInputGre) {
                        lines.push(`/ip firewall filter add chain=input action=accept protocol=gre comment=${quote(`${tag}: allow GRE (protocol 47)`)}`);
                    }
                    if (selfTun) {
                        if (selfTunNet) lines.push(`/ip address add address=${selfTun} interface=${ifName} network=${selfTunNet} comment=${quote(`${tag}: tunnel ip`)}`);
                        else lines.push(`/ip address add address=${selfTun} interface=${ifName} comment=${quote(`${tag}: tunnel ip`)}`);
                    }

                    if (this.form.addBridge) {
                        const br = safe(this.form.bridgeName) || 'bridge-eoip';
                        lines.push('');
                        lines.push(`/interface bridge add name=${br} comment=${quote(`${tag}: bridge`)}`);
                        lines.push(`/interface bridge port add bridge=${br} interface=${ifName} comment=${quote(`${tag}: add eoip`)}`);
                        for (const p of splitPorts(siteSelf.bridgePorts)) {
                            lines.push(`/interface bridge port add bridge=${br} interface=${p} comment=${quote(`${tag}: add ${p}`)}`);
                        }
                    }

                    if (this.form.addStaticRoutes) {
                        lines.push('');
                        lines.push(`/ip route add dst-address=${safe(sitePeer.lanCidr)} gateway=${peerTunHost} comment=${quote(`${tag}: route to ${safe(sitePeer.name)} LAN`)}`);
                    }
                    return lines.join('\n');
                }
            },
            mounted() {
                const onTheme = (e) => { this.theme = e.detail.theme; };
                window.addEventListener('mikrotik-theme-effective-change', onTheme);
                this._offTheme = () => window.removeEventListener('mikrotik-theme-effective-change', onTheme);

                const onLang = (e) => { this.lang = (e && e.detail && e.detail.lang) ? e.detail.lang : this.lang; };
                window.addEventListener('mikrotik-lang-change', onLang);
                this._offLang = () => window.removeEventListener('mikrotik-lang-change', onLang);
            },
            beforeUnmount() {
                if (this._offTheme) this._offTheme();
                if (this._offLang) this._offLang();
            }
        }).mount('#app');
    </script>
</body>
</html>
